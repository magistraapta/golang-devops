global:
  scrape_interval: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "go-app"
    static_configs:
      - targets: ["go-app:8080"]
    metrics_path: "/metrics"
    scheme: "http"
    scrape_timeout: 5s